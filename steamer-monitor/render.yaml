services:
  - type: web
    name: steamiq
    env: python
    region: frankfurt
    plan: free

    buildCommand: pip install -r requirements.txt && python seed_db.py
    startCommand: gunicorn app:app --workers 1 --threads 2 --timeout 120

    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: BETFAIR_APP_KEY
        sync: false
      - key: BETFAIR_USERNAME
        sync: false
      - key: BETFAIR_PASSWORD
        sync: false
```

